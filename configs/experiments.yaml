defaults:
  batch_size: 2
  seed: 42
  image_dir: isic_segmentation/images_segmentation
  mask_dir: isic_segmentation/ground_truth
  model_dir: models
  results_path: results/results.csv
  num_workers: 0

# Archival record of experiments.
# The two lightaug runs reflect an earlier augmentation name and are kept here
# to preserve experiment history.
experiments:
  - run_name: unet_isic_noaug_lr1e4_e20
    augmentation_type: noaug
    epochs: 20
    lr: 0.0001

  - run_name: unet_isic_noaug_lr3e4_e20
    augmentation_type: noaug
    epochs: 20
    lr: 0.0003

  - run_name: unet_isic_noaug_lr1e3_e20
    augmentation_type: noaug
    epochs: 20
    lr: 0.001

  - run_name: unet_isic_noaug_lr5e5_e20
    augmentation_type: noaug
    epochs: 20
    lr: 0.00005

  - run_name: unet_isic_lightaug_lr1e4_e20
    augmentation_type: lightaug
    epochs: 20
    lr: 0.0001

  - run_name: unet_isic_lightaug_lr5e5_e20
    augmentation_type: lightaug
    epochs: 20
    lr: 0.00005

  - run_name: unet_isic_noaug_lr5e5_e40
    augmentation_type: noaug
    epochs: 40
    lr: 0.00005

  - run_name: unet_isic_geomaug_lr5e5_e40
    augmentation_type: geomaug
    epochs: 40
    lr: 0.00005

  - run_name: unet_isic_mildaug_lr5e5_e40
    augmentation_type: mildaug
    epochs: 40
    lr: 0.00005

  - run_name: unet_isic_strongaug_lr5e5_e40
    augmentation_type: strongaug
    epochs: 40
    lr: 0.00005

  - run_name: unet_isic_noaug_lr3e5_e40
    augmentation_type: noaug
    epochs: 40
    lr: 0.00003

  - run_name: unet_isic_mildaug_lr3e5_e40
    augmentation_type: mildaug
    epochs: 40
    lr: 0.00003

  - run_name: unet_isic_noaug_lr7e5_e40
    augmentation_type: noaug
    epochs: 40
    lr: 0.00007

  - run_name: unet_isic_mildaug_lr7e5_e40
    augmentation_type: mildaug
    epochs: 40
    lr: 0.00007

  - run_name: unet_isic_geomaug_lr5e5_e75_final
    augmentation_type: geomaug
    epochs: 75
    lr: 0.00005
